  '404': '404 Not Found - Nicky Portfolio'

const AnimatedSection = ({ children, className = '', animationClass = 'animate__fadeInUp', delay = '0ms', threshold = 0.1 }) => {
  const [isIntersecting, setIsIntersecting] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    const observer = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) {
        setIsIntersecting(true);
        observer.unobserve(entry.target);
      }
    }, {
      threshold: threshold
    });

    if (ref.current) {
      observer.observe(ref.current);
    }

    const element = ref.current;
    return () => {
      if (element) {
        observer.unobserve(element);
      }
    };
  }, [threshold]);

  return (
    <div
      ref={ref}
      className={`${className} ${isIntersecting ? `animate__animated ${animationClass}` : 'section-hidden'}`}
      style={{ animationDelay: isIntersecting ? delay : undefined }}
    >
      {children}
    </div>
  );
};

window.AnimatedSection = AnimatedSection;

    </script>

    <script type="text/babel" data-presets="react">
const Hero = () => {
  // Typing animation state
  const [typedText, setTypedText] = useState('');
  const [wordIndex, setWordIndex] = useState(0);
  const [charIndex, setCharIndex] = useState(0);
  const [isDeleting, setIsDeleting] = useState(false);

  const words = ["Nicky", "a STEM Student.", "a Cybersecurity Enthusiast.", "a Web Developer.", "a Femboy Lover"];
  const typingDelay = 100;
  const erasingDelay = 50;
  const newWordDelay = 2000;

  useEffect(() => {
    let timer;
    const currentWord = words[wordIndex];

    if (isDeleting) {
      timer = setTimeout(() => {
        setTypedText(currentWord.substring(0, charIndex - 1));
        setCharIndex(prev => prev - 1);
      }, erasingDelay);
    } else {
      timer = setTimeout(() => {
        setTypedText(currentWord.substring(0, charIndex + 1));
        setCharIndex(prev => prev + 1);
      }, typingDelay);
    }

    // Word finished typing
    if (!isDeleting && charIndex === currentWord.length) {
      clearTimeout(timer);
      timer = setTimeout(() => {
        setIsDeleting(true);
      }, newWordDelay);
    } 
    // Word finished erasing
    else if (isDeleting && charIndex === 0) {
      setIsDeleting(false);
      setWordIndex(prev => (prev + 1) % words.length);
      clearTimeout(timer);
      timer = setTimeout(() => {}, 500);
    }

    return () => clearTimeout(timer);
  }, [charIndex, isDeleting, wordIndex]);

  // Skill progress animation
  const [animateProgress, setAnimateProgress] = useState(false);
  useEffect(() => {
    const timer = setTimeout(() => {
      setAnimateProgress(true);
    }, 400);
    return () => clearTimeout(timer);
  }, []);

  const skills = [
    { name: 'TALL Stack (Tailwind, Alpine.js, Laravel, Livewire)', percent: 50 },
    { name: 'Cybersecurity (Penetration Testing, CTF)', percent: 80 },
    { name: 'MERN Stack (MongoDB, Express.js, React, Node.js)', percent: 75 },
    { name: 'Linux & Command Line', percent: 95 },
  ];

  return (
    <div className="hero-wrapper-redesigned rounded-4 mb-4">
      {/* Redesigned cyber backgrounds */}
      <div className="hero-grid-bg-enhanced"></div>
      <div className="hero-pulse-ring"></div>
      <div className="hero-pulse-ring-inner"></div>
      <div className="scanner-line-enhanced"></div>

      <div className="container-fluid hero-content">
        <div className="row align-items-center g-4">
          
          {/* Left Info Column */}
          <div className="col-lg-7 text-start animate__animated animate__fadeInLeft">
            <span className="badge rounded-pill bg-dark border border-neon text-light px-3 py-2 mb-3 font-mono text-uppercase" style={{ letterSpacing: '0.05em' }}>
              <span className="terminal-status-indicator"></span>SYS_INITIALIZED: ACTIVE
            </span>
            
            <h1 className="hero-title-gradient mb-2">
              Selamat Datang
            </h1>
            
            <p className="fs-4 text-light mb-3 font-mono" style={{ minHeight: '2.2rem' }}>
              I am <span className="neon-dim fw-bold">{typedText}</span>
              <span className="typing-cursor neon">|</span>
            </p>
            
            <p className="text-secondary small mb-4 lh-lg" style={{ maxWidth: '540px' }}>
              Selamat datang di portofolio STEM. Saya mengeksplorasi Web Development, Cybersecurity, dan IoT dengan memegang teguh standar kurikulum, integritas kode, dan efisiensi teknologi.
            </p>
            
            <div className="d-flex flex-wrap gap-3">
              <a href="#skills" className="btn btn-neon-outline px-4 font-mono text-uppercase d-inline-flex align-items-center justify-content-center">
                <span>&gt; Lihat Skills</span>
              </a>
              <a href="#form" className="btn btn-outline-light px-4 font-mono text-uppercase d-inline-flex align-items-center justify-content-center" style={{ minHeight: '44px' }}>
                <span>&gt; Hubungi Saya</span>
              </a>
            </div>
          </div>
          
          {/* Right Diagnostic Column */}
          <div className="col-lg-5 animate__animated animate__fadeInRight">
            <div className="hero-glowing-card font-mono text-start">
              <div className="d-flex justify-content-between align-items-center mb-3 pb-2 border-bottom border-neon">
                <span className="text-secondary small">&gt;_ SYSTEM_DIAGNOSTIC</span>
                <span className="badge bg-neon-dark text-neon border border-neon py-1 px-2 small animate__animated animate__pulse animate__infinite">SECURE</span>
              </div>
              
              <div className="d-flex flex-column gap-3 small">

        email: '',
        topik: '',
        pesan: '',

const BackToTop = () => {
  const [visible, setVisible] = useState(false);

  useEffect(() => {
    const handleScroll = () => {
      setVisible(window.scrollY > 400);
    };
    window.addEventListener('scroll', handleScroll, { passive: true });
    handleScroll();
    return () => window.removeEventListener('scroll', handleScroll);
  }, []);

  const scrollToTop = () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  if (!visible) return null;

  return (
    <button
      type="button"
      className="back-to-top btn btn-neon-outline rounded-circle d-flex align-items-center justify-content-center"
      onClick={scrollToTop}
      aria-label="Kembali ke atas"
      title="Back to top"
    >

    <script type="text/babel" data-presets="react">
const App = () => {
  const [currentPage, setCurrentPage] = useState('home');
  const [isProfileOpen, setIsProfileOpen] = useState(false);
  const [componentsReady, setComponentsReady] = useState(false);

  useEffect(() => {
    const required = [
      'Navbar', 'ProfileOffcanvas', 'Footer', 'Home', 'Gallery',
      'ContactForm', 'Hero', 'AboutMe', 'GitHubStreak',
      'Prinsip', 'SnakeContribution', 'AnimatedSection',
      'StatsBar', 'SkillsStack', 'Experience', 'Blog', 'UsesSetup',
      'Achievements', 'NotFound', 'BackToTop'
    ];

    const checkComponents = () => {
      const allReady = required.every((name) => typeof window[name] !== 'undefined');
      if (allReady) {
        setComponentsReady(true);
      } else {
        setTimeout(checkComponents, 50);
      }
    };

    checkComponents();
  }, []);

  useEffect(() => {
    const onHash = () => {
      const hash = window.location.hash.replace('#', '');
      const validPages = window.VALID_PAGES || [];
      if (hash === '') {
        setCurrentPage('home');
      } else if (validPages.includes(hash)) {
        setCurrentPage(hash);
      } else {
        setCurrentPage('404');
      }
      window.scrollTo({ top: 0, behavior: 'smooth' });
      const titles = window.PAGE_TITLES || {};
      const page = hash === '' ? 'home' : (validPages.includes(hash) ? hash : '404');
      document.title = titles[page] || 'My Portfolio - Nicky';
    };

    onHash();
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  if (!componentsReady) {
    return (
      <div className="d-flex flex-column justify-content-center align-items-center min-vh-100 font-mono">
        <div className="spinner-border text-info mb-3" role="status">
          <span className="visually-hidden">Loading...</span>
        </div>
        <div className="neon animate__animated animate__pulse animate__infinite">&gt; COMPILING_COMPONENTS...</div>
      </div>
    );
  }

  const Navbar = window.Navbar;
  const ProfileOffcanvas = window.ProfileOffcanvas;
  const Footer = window.Footer;
  const BackToTop = window.BackToTop;
  const Home = window.Home;
  const Gallery = window.Gallery;
  const ContactForm = window.ContactForm;
  const SkillsStack = window.SkillsStack;
  const Experience = window.Experience;
  const Blog = window.Blog;
  const UsesSetup = window.UsesSetup;
  const NotFound = window.NotFound;

  const renderActivePage = () => {
    switch (currentPage) {
      case 'home':
        return <Home />;
      case 'skills':
        return <SkillsStack />;
      case 'experience':
        return <Experience />;
      case 'galeri':
        return <Gallery />;
      case 'blog':
        return <Blog />;
      case 'uses':
        return <UsesSetup />;
      case 'form':
        return <ContactForm />;
      case '404':
        return <NotFound />;
      default:
        return <NotFound />;
    }
  };

  return (
    <div className="d-flex flex-column min-vh-100">
      <Navbar
        currentPage={currentPage}
        onOpenProfile={() => setIsProfileOpen(true)}
      />
      <ProfileOffcanvas
        isOpen={isProfileOpen}
        onClose={() => setIsProfileOpen(false)}
      />
      <div className="flex-grow-1">
        {renderActivePage()}
      </div>
      <Footer />
      <BackToTop />
    </div>
  );
};

const rootElement = document.getElementById('root');
if (rootElement) {
  ReactDOM.createRoot(rootElement).render(<App />);
}

    </script>
